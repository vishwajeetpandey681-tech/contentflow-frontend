# Charcha Express: copy .env.production.example → .env.production, then:
#   docker compose --env-file .env.production up -d --build
#
# Bind only on localhost (Nginx on same host): use both files:
#   docker compose -f docker-compose.yml -f deploy/docker-compose.bind-localhost.yml --env-file .env.production up -d --build

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-}
        NEXT_PUBLIC_WEBSITE_URL: ${NEXT_PUBLIC_WEBSITE_URL:-}
        NEXT_PUBLIC_WEBSITE_DOMAIN: ${NEXT_PUBLIC_WEBSITE_DOMAIN:-}
    ports:
      - "3000:3000"
    restart: unless-stopped
    environment:
      NODE_ENV: production
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000/',(r)=>{r.resume();process.exit(r.statusCode<500?0:1)}).on('error',()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
