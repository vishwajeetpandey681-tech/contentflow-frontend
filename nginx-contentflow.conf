# ContentFlow — Nginx config for VPS deployment
# Copy to: /etc/nginx/sites-available/contentflow
# Then: sudo ln -s /etc/nginx/sites-available/contentflow /etc/nginx/sites-enabled/
#       sudo nginx -t && sudo systemctl reload nginx
#
# Replace app.yourdomain.com with your domain.

server {
    listen 80;
    server_name app.yourdomain.com;

    location /api {
        proxy_pass http://127.0.0.1:4500;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
