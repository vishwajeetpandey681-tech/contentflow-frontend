# Copy to /etc/nginx/sites-available/contentflow and symlink to sites-enabled.
# Replace charchaexpress.com and SSL paths; proxy_pass points at Docker/PM2 on 127.0.0.1:3000.
#
# TLS (after DNS points here): certbot certonly --nginx -d charchaexpress.com -d www.charchaexpress.com
# Then reload nginx. Use BIND_LOCALHOST=1 in deploy/vps-install.sh so only Nginx is public on 80/443.

server {
    listen 80;
    server_name charchaexpress.com www.charchaexpress.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name charchaexpress.com www.charchaexpress.com;

    ssl_certificate     /etc/letsencrypt/live/charchaexpress.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/charchaexpress.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}
