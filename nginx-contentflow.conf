# Charcha Express — Nginx config for VPS deployment
# Copy to: /etc/nginx/sites-available/charchaexpress
# Then: sudo ln -s /etc/nginx/sites-available/charchaexpress /etc/nginx/sites-enabled/
#       sudo nginx -t && sudo systemctl reload nginx
#
# This is written automatically by deploy/go-live.sh — hand-edit only if needed.

# charchaexpress.com → Next.js on :3000
server {
    listen 80;
    server_name charchaexpress.com www.charchaexpress.com;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}

# backend.charchaexpress.com → Express API on :4500
server {
    listen 80;
    server_name backend.charchaexpress.com;

    location / {
        proxy_pass http://127.0.0.1:4500;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}
